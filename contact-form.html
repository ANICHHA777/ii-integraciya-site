<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ИИнтеграция — Заявка</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@200;300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #04060f;
      --surface: #080c18;
      --border:  rgba(90, 160, 220, 0.1);
      --accent:  #4ab8d4;
      --text:    rgba(210, 228, 244, 0.9);
      --muted:   rgba(140, 170, 200, 0.55);
      --font-h:  'Exo 2', 'Arial Narrow', Arial, sans-serif;
      --font-b:  'Inter', system-ui, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-b); min-height: 100vh; }
    .form-container { max-width: 600px; margin: 100px auto; padding: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    h1 { font-family: var(--font-h); font-weight: 200; font-size: 32px; margin-bottom: 16px; }
    .subtitle { color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
    .form-group { margin-bottom: 24px; }
    label { display: block; font-family: var(--font-h); font-weight: 300; font-size: 14px; margin-bottom: 8px; color: var(--accent); }
    input, textarea { width: 100%; padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font-b); font-size: 15px; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(74,184,212,0.2); }
    textarea { resize: vertical; min-height: 120px; }
    button { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-family: var(--font-h); font-weight: 300; font-size: 16px; cursor: pointer; transition: background 0.25s; }
    button:hover { background: #5ecc4f; }
    .back { display: inline-block; margin-top: 24px; color: var(--muted); text-decoration: none; font-size: 14px; }
    .back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Заявка на стратегическую встречу</h1>
    <p class="subtitle">Оставьте свои данные — мы свяжемся с вами в течение 30 минут для обсуждения.</p>
    <form action="https://formspree.io/f/mkokzywb" method="POST">
      <div class="form-group">
        <label for="name">Имя</label>
        <input type="text" id="name" name="name" required placeholder="Ваше имя">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label for="phone">Телефон</label>
        <input type="tel" id="phone" name="phone" required placeholder="+7 (999) 000-00-00">
      </div>
      <div class="form-group">
        <label for="company">Компания / Должность</label>
        <input type="text" id="company" name="company" placeholder="Организация и должность">
      </div>
      <div class="form-group">
        <label for="message">Комментарий</label>
        <textarea id="message" name="message" placeholder="Кратко опишите вашу задачу или вопрос"></textarea>
      </div>
      <button type="submit">Отправить заявку</button>
    </form>
    <a href="/" class="back">← Вернуться на сайт</a>
  </div>
</body>
</html>
